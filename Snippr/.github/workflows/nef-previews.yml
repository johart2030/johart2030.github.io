name: Generate NEF Previews

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  generate-previews:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SOURCE_BUCKET: ${{ vars.SOURCE_BUCKET || 'images' }}
      PREVIEW_BUCKET: ${{ vars.PREVIEW_BUCKET || 'images' }}
      PREVIEW_FOLDER: ${{ vars.PREVIEW_FOLDER || 'previews' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Verify required secrets
        run: |
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_SERVICE_ROLE_KEY"

      - name: Generate previews
        run: npm run nef:previews
