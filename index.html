.popular {
    position: relative;
    display: block;
    text-decoration: none;
    color: #000;
    background: linear-gradient(135deg, #ffd700, #ffea70);
    padding: 15px;
    margin: 12px 0;

    text-align: center;
    transition: 0.25s;
    border: 1px solid #30363d;
    overflow: hidden;
    font-weight: bold;
}

/* ✨ Gleam animation */
.popular::before {
    content: "";
    position: absolute;
    top: 0;
    left: -75%;
    width: 50%;
    height: 100%;
    background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.6),
        transparent
    );
    transform: skewX(-20deg);
}

.popular:hover::before {
    animation: shine 0.8s forwards;
}

@keyframes shine {
    100% {
        left: 125%;
    }
}

/* 🌟 Glow on hover */
.popular:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(255, 215, 0, 0.7);
}
